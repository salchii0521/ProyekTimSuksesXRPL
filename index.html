        function showPage(page, btn) {

            if (typeof pages[page] === "function") {
                content.innerHTML = pages[page](); // ✅ kalau function
            } else {
                content.innerHTML = pages[page]; // ✅ kalau string
            }

            document.querySelectorAll("nav button")
                .forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            if (page === "kesan") {
                setTimeout(initKomentar, 0);
            }

            if (page === "beranda") {
                setTimeout(initAbsensi, 0);
            }
        }

        function bukaAdmin() {
            const user = prompt("Username:");
            const pass = prompt("Password:");

            if (user === "admin" && pass === "123") {
                window.location.href = "admin.html";
            } else {
                alert("Login gagal!");
            }
        }

        /* ==== SCRIPT KOMENTAR ==== */
        function initKomentar() {
            const form = document.getElementById("formKomentar");
            const daftar = document.getElementById("daftarKomentar");
            if (!form) return;

            form.addEventListener("submit", function (e) {
                e.preventDefault();

                const nama = document.getElementById("nama").value;
                const pesan = document.getElementById("pesan").value;

                const div = document.createElement("div");
                div.classList.add("item");
                div.innerHTML = "<strong>" + nama + "</strong><br>" + pesan;

                daftar.appendChild(div);
                form.reset();
            });
        }

        function initAbsensi() {
            const form = document.getElementById("formAbsensi");
            if (!form) return;

            form.addEventListener("submit", function (e) {
                e.preventDefault();

                const nama = document.getElementById("namaAbsensi").value;
                const kelas = document.getElementById("kelas").value;
                const ket = document.getElementById("keterangan").value;
                const tanggal = new Date().toISOString().split("T")[0];
                let data = JSON.parse(localStorage.getItem("absensi")) || [];

                data.push({ nama, kelas, ket, tanggal });

                localStorage.setItem("absensi", JSON.stringify(data));

                alert("Absensi berhasil!");

                form.reset();
            });
        }
    </script>
