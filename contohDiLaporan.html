<!DOCTYPE html>
<html lang="id">

<head>
    <title>Profil Sekolah | SMKN 3 Jember</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background-image: url(background.jpg);
            color: #ffffff;
            min-height: 100vh;
        }

        header {
            padding: 90px 20px 30px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 14px;
            padding-bottom: 25px;
        }

        nav button {
            background: transparent;
            border: 1px solid navy;
            color: white;
            padding: 12px 26px;
            border-radius: 999px;
            cursor: pointer;
            transition: .35s ease;
        }

        nav button:hover,
        nav button.active {
            background: navy;
            color: white;
            box-shadow: 0 0 25px navy;
            transform: translateY(-3px);
        }

        .card {
            background: rgba(255, 255, 255, .05);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 247, .15);
        }

        .bg-putih {
            background: rgba(255, 255, 255, 0.685);
            color: black;
            padding: 25px;
            border-radius: 20px;
        }

        .box {
            background: rgba(255, 255, 255, .07);
            border-radius: 20px;
            overflow: hidden;
            text-align: center;
            transition: .35s ease;
        }

        .box:hover {
            transform: translateY(-8px) scale(1.04);
            box-shadow: 0 18px 40px navy;
        }

        .box img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            align-items: stretch;
        }

        .ekskul-box {
            position: relative;
            cursor: pointer;
        }

        .ekskul-box:hover img {
            transform: scale(1.1);
            filter: brightness(60%);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            opacity: 0;
            transition: 0.4s;
        }

        .ekskul-box:hover .overlay {
            opacity: 1;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        form input,
        form textarea {
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            color: #333;
        }

        form button {
            background: navy;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <header>
        <h1 style="color: navy">SMK NEGERI 3 JEMBER</h1>
    </header>

    <nav>
        <button class="active" onclick="showPage('beranda',this)">Beranda</button>
        <button onclick="showPage('visi',this)">Visi Misi & Tujuan</button>
        <button onclick="showPage('profil',this)">Profil</button>
        <button onclick="showPage('jurusan',this)">Jurusan</button>
        <button onclick="showPage('ekskul',this)">Ekskul</button>
        <button onclick="showPage('prestasi',this)">Prestasi</button>
        <button onclick="showPage('kegiatan',this)">Kegiatan</button>
        <button onclick="showPage('kesan',this)">Kesan & Pesan</button>
    </nav>

    <main id="content"></main>
    <footer>© 2024 SMKN 3 Jember</footer>

    <script>
        const pages = {
            beranda: `
                <div class="card bg-putih">
                    <img class="hero" src="logo sakga.png">
                    <h1>Selamat Datang di SMKN 3 Jember</h1>
                    <p>Sekolah kejuruan unggulan yang berkomitmen menghasilkan
                       lulusan kompeten dan berkarakter.</p>
                    <a href="game.html" class="btn-game">🎮 Main Kuis Sekolah</a>
                </div>
            `,

            visi: `
                <div class="card bg-putih">
                    <h2>Visi</h2>
                    <p>Terwujudnya lulusan yang Religius, Cerdas, Berprestasi,
                       Kreatif dan berdaya saing tinggi.</p>
                    <br>
                    <h2>Misi</h2>
                    <p>Mengintegrasikan nilai-nilai religius dalam pembelajaran.</p>
                    <p>Meningkatkan Link and Match dengan Industri.</p>
                    <p>Mengoptimalisasi kegiatan ekstrakurikuler.</p>
                </div>
            `,

            kesan: `
                <div class="card">
                    <h1 id="judul">Kesan, Pesan & Harapan</h1>
                    <form id="formKomentar">
                        <input type="text" id="nama" placeholder="Nama Anda" required>
                        <textarea id="pesan" placeholder="Tulis pesan Anda..." required></textarea>
                        <button type="submit">Kirim</button>
                    </form>
                    <div class="komentar" id="daftarKomentar"></div>
                </div>
            `
        };

        const content = document.getElementById("content");
        content.innerHTML = pages.beranda;

        function showPage(page, btn) {
            content.innerHTML = typeof pages[page] === "function"
                ? pages[page]()
                : pages[page];

            document.querySelectorAll("nav button")
                .forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            if (page === "kesan") setTimeout(initKomentar, 0);
        }

        function initKomentar() {
            const form = document.getElementById("formKomentar");
            const daftar = document.getElementById("daftarKomentar");
            if (!form) return;

            form.addEventListener("submit", function (e) {
                e.preventDefault();
                const nama = document.getElementById("nama").value;
                const pesan = document.getElementById("pesan").value;

                const div = document.createElement("div");
                div.classList.add("item");
                div.innerHTML = "<strong>" + nama + "</strong><br>" + pesan;
                daftar.appendChild(div);
                form.reset();
            });
        }
    </script>

</body>

</html>
